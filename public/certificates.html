<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificates - South Wind Engineering</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f8fafc;color:#111}
header{background:#fff;padding:20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
.container{max-width:1200px;margin:0 auto;padding:40px 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.06)}
.card img{width:100%;height:220px;object-fit:cover}
.card-content{padding:20px}
.btn{padding:10px 18px;border-radius:999px;border:none;background:#111;color:#fff;cursor:pointer}
</style>
</head>
<body>
<header>
    <h2>South Wind Engineering</h2>
    <div>
        <button class="btn" onclick="toggleLanguage()">বাংলা / EN</button>
        <a href="/" class="btn" style="text-decoration:none;margin-left:10px">Home</a>
    </div>
</header>

<div class="container">
    <h1 id="pageTitle">Company Certifications</h1>
    <div id="certGrid" class="grid"></div>
</div>

<script>
let currentLang = localStorage.getItem('siteLanguage') || 'en';

function toggleLanguage(){
    currentLang = currentLang === 'en' ? 'bn' : 'en';
    localStorage.setItem('siteLanguage', currentLang);
    document.getElementById('pageTitle').textContent = currentLang === 'bn' ? 'কোম্পানির সনদপত্র' : 'Company Certifications';
    loadCertificates();
}

async function loadCertificates(){
    try{
        const res = await fetch('/api/certificates');
        const data = await res.json();
        const grid = document.getElementById('certGrid');
        grid.innerHTML = data.map(c => `
            <div class="card">
                <img src="${c.image_path}" alt="">
                <div class="card-content">
                    <h3>${currentLang === 'bn' ? (c.title_bn || c.title || '') : (c.title_en || c.title || '')}</h3>
                    <p>${currentLang === 'bn' ? (c.description_bn || c.description || '') : (c.description_en || c.description || '')}</p>
                </div>
            </div>
        `).join('');
    }catch(e){
        document.getElementById('certGrid').innerHTML = '<p>Unable to load certificates.</p>';
    }
}

document.getElementById('pageTitle').textContent = currentLang === 'bn' ? 'কোম্পানির সনদপত্র' : 'Company Certifications';
loadCertificates();
</script>
</body>
</html>
