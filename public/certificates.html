<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates - South Wind Engineering</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: #f8fafc;
            color: #111;
        }
        header {
            background: #fff;
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h2 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }
        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .06);
            display: flex;
            flex-direction: column;
            min-height: 340px;
        }
        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }
        .card-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        .card-content h3 {
            margin: 0 0 10px 0;
            font-size: 1.15rem;
            color: #111;
        }
        .card-content p {
            margin: 0;
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
        }
        .btn {
            padding: 10px 18px;
            border-radius: 999px;
            border: none;
            background: #111;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <header>
        <h2>South Wind Engineering</h2>
        <div>
            <button class="btn" onclick="toggleLanguage()">বাংলা / EN</button>
            <a href="/" class="btn" style="text-decoration:none; margin-left:10px">Home</a>
        </div>
    </header>

    <div class="container">
        <h1 id="pageTitle" style="font-size: 2rem; margin-bottom: 30px; font-weight: 700;">Company Certifications</h1>
        <div id="certGrid" class="grid"></div>
    </div>

    <script>
    let currentLang = localStorage.getItem('siteLanguage') || 'en';

    function toggleLanguage(){
        currentLang = currentLang === 'en' ? 'bn' : 'en';
        localStorage.setItem('siteLanguage', currentLang);
        document.getElementById('pageTitle').textContent = currentLang === 'bn' ? 'কোম্পানির সনদপত্র' : 'Company Certifications';
        loadCertificates();
    }

    async function loadCertificates(){
        try{
            const res = await fetch('/api/certificates');
            const data = await res.json();
            
            function getSafeArray(payload) {
                if (Array.isArray(payload)) return payload;
                if (payload && typeof payload === 'object') {
                    return payload.data || payload.certificates || [];
                }
                return [];
            }
            const list = getSafeArray(data);

            const grid = document.getElementById('certGrid');
            if (list.length === 0) {
                grid.innerHTML = '<p style="color:#666;">No certificates available yet.</p>';
                return;
            }

            grid.innerHTML = list.map(c => {
                const imgPath = c.image_path ? c.image_path : 'images/unnamed1.jpg';
                const title = currentLang === 'bn' ? (c.title_bn || c.title || '') : (c.title_en || c.title || '');
                const desc = currentLang === 'bn' ? (c.description_bn || c.description || '') : (c.description_en || c.description || '');
                return `
                    <div class="card">
                        <img src="${imgPath}" alt="" onerror="this.src='images/unnamed1.jpg'">
                        <div class="card-content">
                            <h3>${title}</h3>
                            <p>${desc}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }catch(e){
            document.getElementById('certGrid').innerHTML = '<p>Unable to load certificates.</p>';
        }
    }

    document.getElementById('pageTitle').textContent = currentLang === 'bn' ? 'কোম্পানির সনদপত্র' : 'Company Certifications';
    loadCertificates();
    </script>
</body>
</html>
