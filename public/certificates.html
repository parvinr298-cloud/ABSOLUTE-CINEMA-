<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates - South Wind Engineering</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: #f8fafc;
            color: #111;
        }
        header {
            background: #fff;
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h2 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        /* Fixed card styling with flexible and clean document framing */
        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .06);
            display: flex;
            flex-direction: column;
            min-height: 380px; 
        }
        .card img {
            width: 100%;
            height: 240px;
            object-fit: contain; /* Ensures the document is never cropped and always fully visible */
            background: #f1f5f9;  /* Elegant neutral background framing for documents */
            display: block;
            padding: 15px;       /* Margin to create a professional paper frame effect */
            box-sizing: border-box;
        }
        .card-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            border-top: 1px solid #e5e7eb; /* Subtle line dividing the image and text */
        }
        .card-content h3 {
            margin: 0 0 10px 0;
            font-size: 1.15rem;
            color: #111;
        }
        .card-content p {
            margin: 0;
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
        }
        .btn {
            padding: 10px 18px;
            border-radius: 999px;
            border: none;
            background: #111;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.85rem;
        }

        /* Completely hide Google Translate widgets, dropdowns, and frames */
        #google_translate_element, 
        .skiptranslate, 
        .goog-te-banner-frame, 
        .goog-te-gadget, 
        .goog-te-balloon-frame {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            height: 0 !important;
            width: 0 !important;
            position: absolute !important;
            top: -9999px !important;
            left: -9999px !important;
        }
        body {
            top: 0px !important;
        }
        .goog-tooltip, .goog-tooltip:hover {
            display: none !important;
            box-shadow: none !important;
        }
        .goog-text-highlight {
            background-color: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>
    <header>
        <h2>South Wind Engineering</h2>
        <div>
            <button class="btn" onclick="toggleLanguage()">বাংলা / EN</button>
            <a href="/" class="btn" style="text-decoration:none; margin-left:10px">Home</a>
        </div>
    </header>

    <div class="container">
        <h1 id="pageTitle" style="font-size: 2rem; margin-bottom: 30px; font-weight: 700;">Company Certifications</h1>
        <div id="certGrid" class="grid"></div>
    </div>

    <!-- Invisible Google Translate Init Element -->
    <div id="google_translate_element" style="display:none !important;"></div>
    <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE, autoDisplay: false}, 'google_translate_element');
    }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
    function setCookie(name, value, days) {
        let expires = "";
        if (days) {
            let date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "") + expires + "; path=/";
    }

    let currentLang = localStorage.getItem('siteLanguage') || 'en';

    function applyLanguage(lang) {
        currentLang = lang;
        if (lang === 'bn') {
            document.getElementById('pageTitle').textContent = 'কোম্পানির সনদপত্র';
            setCookie('googtrans', '/en/bn', 30);
        } else {
            document.getElementById('pageTitle').textContent = 'Company Certifications';
            setCookie('googtrans', '/en/en', 30);
        }
    }

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'bn' : 'en';
        localStorage.setItem('siteLanguage', currentLang);
        applyLanguage(currentLang);
        location.reload(); 
    }

    function getSafeArray(payload) {
        if (Array.isArray(payload)) return payload;
        if (payload && typeof payload === 'object') {
            return payload.data || payload.certificates || [];
        }
        return [];
    }

    async function loadCertificates(){
        try{
            const res = await fetch('/api/certificates');
            const data = await res.json();
            const list = getSafeArray(data);
            const grid = document.getElementById('certGrid');
            if (list.length === 0) {
                grid.innerHTML = '<p style="color:#666;">No certificates available yet.</p>';
                return;
            }
            grid.innerHTML = list.map(c => `
                <div class="card">
                    <img src="${c.image_path ? c.image_path : 'images/unnamed1.jpg'}" alt="" onerror="this.src='images/unnamed1.jpg'">
                    <div class="card-content">
                        <h3>${c.title_en || c.title || ''}</h3>
                        <p>${c.description_en || c.description || ''}</p>
                    </div>
                </div>
            `).join('');
        }catch(e){
            document.getElementById('certGrid').innerHTML = '<p>Unable to load certificates.</p>';
        }
    }

    applyLanguage(currentLang);
    loadCertificates();
    </script>
</body>
</html>
