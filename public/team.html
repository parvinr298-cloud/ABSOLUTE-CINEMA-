<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Team - South Wind Engineering</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f8fafc;color:#111}
header{background:#fff;padding:20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
.container{max-width:1200px;margin:0 auto;padding:40px 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}

/* Clean, standard height layouts for Team */
.card{
    background:#fff;
    border:1px solid #e5e7eb;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.06);
    display: flex;
    flex-direction: column;
    min-height: 420px; 
}
.card img{
    width:100%;
    height:280px;
    object-fit:cover;
    display: block;
}
.card-content{
    padding:20px;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
}
.card-content h3 {
    margin: 0 0 5px 0;
    font-size: 1.2rem;
    color: #111;
}
.position{
    color:#0f766e;
    font-weight:700;
    margin-bottom:10px;
    font-size: 0.95rem;
}
.card-content p {
    margin: 0;
    font-size: 0.9rem;
    color: #666;
    line-height: 1.5;
}
.btn{padding:10px 18px;border-radius:999px;border:none;background:#111;color:#fff;cursor:pointer}
</style>
</head>
