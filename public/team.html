<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Team - South Wind Engineering</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: #f8fafc;
            color: #111;
            padding-bottom: 60px;
        }
        header {
            background: #fff;
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h2 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        /* Fixed card styling to prevent empty card collapse */
        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .06);
            display: flex;
            flex-direction: column;
            min-height: 420px;
        }
        .card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
        }
        .card-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        .card-content h3 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
            color: #111;
        }
        .position {
            color: #0f766e;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        .card-content p {
            margin: 0;
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
        }
        .btn {
            padding: 10px 18px;
            border-radius: 999px;
            border: none;
            background: #111;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.85rem;
        }

        /* Google Translate Header Frame & Branding Overrides */
        .goog-te-banner-frame.skiptranslate, .goog-te-banner-frame {
            display: none !important;
        }
        body {
            top: 0px !important;
        }
        .goog-tooltip, .goog-tooltip:hover {
            display: none !important;
            box-shadow: none !important;
        }
        .goog-text-highlight {
            background-color: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>
    <header>
        <h2>South Wind Engineering</h2>
        <div>
            <button class="btn" onclick="toggleLanguage()">বাংলা / EN</button>
            <a href="/" class="btn" style="text-decoration:none; margin-left:10px">Home</a>
        </div>
    </header>

    <div class="container">
        <h1 id="pageTitle" style="font-size: 2rem; margin-bottom: 30px; font-weight: 700;">Our Team</h1>
        <div id="teamGrid" class="grid"></div>
    </div>

    <!-- Google Translate Loader Element -->
    <div id="google_translate_element" style="display:none;"></div>
    <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE, autoDisplay: false}, 'google_translate_element');
    }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
    let currentLang = localStorage.getItem('siteLanguage') || 'en';

    function applyLanguage(lang) {
        currentLang = lang;
        if (lang === 'bn') {
            document.getElementById('pageTitle').textContent = 'আমাদের টিম';
            if (window.location.hash !== '#googtrans(en|bn)') {
                window.location.hash = '#googtrans(en|bn)';
                location.reload();
            }
        } else {
            document.getElementById('pageTitle').textContent = 'Our Team';
            if (window.location.hash && window.location.hash !== '#googtrans(en|en)') {
                window.location.hash = '#googtrans(en|en)';
                location.reload();
            }
        }
    }

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'bn' : 'en';
        localStorage.setItem('siteLanguage', currentLang);
        applyLanguage(currentLang);
    }

    function getSafeArray(payload) {
        if (Array.isArray(payload)) return payload;
        if (payload && typeof payload === 'object') {
            return payload.data || payload.team || [];
        }
        return [];
    }

    async function loadTeam(){
        try{
            const res = await fetch('/api/team');
            const data = await res.json();
            const list = getSafeArray(data);
            const grid = document.getElementById('teamGrid');
            if (list.length === 0) {
                grid.innerHTML = '<p style="color:#666;">No team members available yet.</p>';
                return;
            }
            grid.innerHTML = list.map(m => `
                <div class="card">
                    <img src="${m.image_path ? m.image_path : 'images/unnamed1.jpg'}" alt="" onerror="this.src='images/unnamed1.jpg'">
                    <div class="card-content">
                        <h3>${m.name_en || m.name || ''}</h3>
                        <div class="position">${m.position_en || m.position || ''}</div>
                        <p>${m.description_en || m.description || ''}</p>
                    </div>
                </div>
            `).join('');
        }catch(e){
            document.getElementById('teamGrid').innerHTML = '<p>Unable to load team members.</p>';
        }
    }

    applyLanguage(currentLang);
    loadTeam();
    </script>
</body>
</html>
