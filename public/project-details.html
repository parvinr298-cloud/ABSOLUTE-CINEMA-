    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* ==========================================================================
           1. CSS VARIABLES & CORE SETUP
           ========================================================================== */
        :root {
            --color-bg: #ffffff;
            --color-text: #1a1a1a;
            --color-text-muted: #666666;
            --color-accent: #000000;
            --color-primary: #1a1a1a;
            --color-surface: #fcfcfc;
            --color-surface-dark: #f2f2f2;
            --color-border: #eeeeee;
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Playfair Display', serif;
            --transition-smooth: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-fast: 0.3s ease;
            --header-height: 90px;
            --container-width: 1440px;
        }

        [data-theme="light"] {
            --color-bg: #ffffff;
            --color-text: #1a1a1a;
            --color-text-muted: #666666;
            --color-accent: #000000;
            --color-surface: #fcfcfc;
            --color-surface-dark: #f2f2f2;
            --color-border: #eeeeee;
        }

        [data-theme="dark"] {
            --color-bg: #0a0a0a;
            --color-text: #ffffff;
            --color-text-muted: #a0a0a0;
            --color-accent: #ffffff;
            --color-surface: #141414;
            --color-surface-dark: #1f1f1f;
            --color-border: #2a2a2a;
        }

        [data-theme="blueprint"] {
            --color-bg: #00162e;
            --color-text: #dcf1ff;
            --color-text-muted: #74aade;
            --color-accent: #00f0ff;
            --color-surface: #002347;
            --color-surface-dark: #002d59;
            --color-border: #003c73;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.7;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--color-bg); }
        ::-webkit-scrollbar-thumb { background: var(--color-text-muted); border-radius: 10px; }

        /* ==========================================================================
           2. PREMIUM LOADER
           ========================================================================== */
        #premium-loader {
            position: fixed;
            inset: 0;
            background-color: var(--color-bg);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .loader-content {
            text-align: center;
        }

        .loader-logo {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .loader-logo span {
            display: block;
            transform: translateY(100%);
            animation: revealUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes revealUp {
            to { transform: translateY(0); }
        }

        .loader-bar-bg {
            width: 200px;
            height: 2px;
            background: var(--color-border);
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .loader-bar-fill {
            position: absolute;
            height: 100%;
            width: 0;
            background: var(--color-accent);
            transition: width 0.4s ease;
        }

        .loading-compass {
            width: 50px;
            height: 50px;
            border: 2px solid transparent;
            border-top-color: var(--color-accent);
            border-bottom-color: var(--color-accent);
            border-radius: 50%;
            animation: spinCompass 1.5s linear infinite;
            margin: 0 auto 25px auto;
        }
        @keyframes spinCompass {
            to { transform: rotate(360deg); }
        }

        /* ==========================================================================
           3. CUSTOM NAVIGATION & HAMBURGER
           ========================================================================== */
        header {
            position: fixed;
            top: 0; width: 100%;
            height: var(--header-height);
            display: flex;
            align-items: center;
            z-index: 1000;
            transition: all 0.4s ease;
            background: transparent;
        }

        header.scrolled {
            background: var(--color-bg);
            height: 70px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--color-border);
        }

        .nav-inner {
            width: 90%;
            max-width: var(--container-width);
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            font-weight: 700;
            text-decoration: none;
            color: var(--color-text);
            letter-spacing: -0.5px;
            z-index: 1100;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--color-text);
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px; left: 0;
            width: 0; height: 1.5px;
            background: var(--color-accent);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after { width: 100%; }

        /* Hamburger Drawer Styles */
        .hamburger-btn {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 26px;
            height: 18px;
            cursor: pointer;
            z-index: 1100;
            background: transparent;
            border: none;
            outline: none;
        }
        .hamburger-btn span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: var(--color-text);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .hamburger-btn.active span:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        .hamburger-btn.active span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }
        .hamburger-btn.active span:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }

        /* Mobile Nav Slides Panel (Links shifted upwards) */
        .mobile-nav-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            max-width: 380px;
            height: 100vh;
            background: var(--color-bg);
            z-index: 1050;
            box-shadow: -15px 0 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            padding: 40px;
            gap: 2rem;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .mobile-nav-panel.active {
            right: 0;
        }
        .mobile-nav-panel a {
            text-decoration: none;
            color: var(--color-text);
            font-size: 1.3rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid transparent;
            padding-bottom: 5px;
            transition: all 0.3s;
        }
        .mobile-nav-panel a:hover {
            color: var(--color-text-muted);
            border-bottom-color: var(--color-accent);
        }

        /* ==========================================================================
           4. PORTFOLIO PAGE INTRO HEADER
           ========================================================================== */
        .intro-header-block {
            padding: 180px 0 60px 0;
            text-align: center;
        }
        .intro-header-block span {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.85rem;
            color: var(--color-text-muted);
        }
        .intro-header-block h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-family: var(--font-serif);
            margin-top: 15px;
            font-weight: 700;
        }

        /* ==========================================================================
           5. PORTFOLIO FILTER TABS & PROJECTS GALLERY
           ========================================================================== */
        .portfolio-filters-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-text);
            padding: 10px 25px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 4px;
        }
        .filter-btn.active, .filter-btn:hover {
            background: var(--color-accent);
            color: var(--color-bg);
            border-color: var(--color-accent);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            border-top: 1px solid var(--color-border);
            padding-top: 40px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            background: #eee;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gallery-item:hover img { transform: scale(1.05); }

        /* Masonry Layout Coordinates */
        .gi-1 { grid-column: span 8; height: 500px; }
        .gi-2 { grid-column: span 4; height: 500px; }
        .gi-3 { grid-column: span 4; height: 400px; }
        .gi-4 { grid-column: span 4; height: 400px; }
        .gi-5 { grid-column: span 4; height: 400px; }
        .gi-6 { grid-column: span 6; height: 500px; }
        .gi-7 { grid-column: span 6; height: 500px; }

        .item-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .gallery-item:hover .item-overlay { opacity: 1; }

        .item-overlay span {
            color: #fff;
            padding: 10px 25px;
            border: 1px solid #fff;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        /* ==========================================================================
           6. FOOTER
           ========================================================================== */
        footer {
            padding: 80px 0;
            border-top: 1px solid var(--color-border);
            text-align: center;
            position: relative; 
            overflow: hidden;
            background: var(--color-surface-dark);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .social-links a {
            color: var(--color-text);
            font-size: 1.5rem;
            transition: transform 0.3s;
        }

        .social-links a:hover { transform: translateY(-5px); }

        .copyright {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ==========================================================================
           7. FLOATING CONTROLS
           ========================================================================== */
        .floating-action {
            position: fixed;
            bottom: 40px;
            right: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 999;
        }

        .float-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-text) !important;
            text-decoration: none;
            font-size: 1.4rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.15) !important;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }
        [data-theme="dark"] .float-btn {
            background: rgba(0,0,0,0.3) !important;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .float-btn:hover { transform: scale(1.1) translateY(-3px); }

        .f-whatsapp { color: #25D366 !important; }
        .f-phone { color: var(--color-accent) !important; }

        /* Back to Top floating button */
        .back-to-top-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--color-text);
            font-size: 1.2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        [data-theme="dark"] .back-to-top-btn {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .back-to-top-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .back-to-top-btn:hover {
            transform: scale(1.1) translateY(-3px);
        }

        /* ==========================================================================
           8. RESPONSIVE & ANIMATIONS
           ========================================================================== */
        @media (max-width: 992px) {
            .nav-links { display: none; }
            .hamburger-btn { display: flex; }
            .gi-1, .gi-2, .gi-3, .gi-4, .gi-5, .gi-6, .gi-7 { grid-column: span 12; height: 350px; }
        }

        /* Animation classes */
        .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* STICKMAN SILHOUETTE FOOTER */
        .footer-skyline-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            pointer-events: none;
            user-select: none;
            color: #000000 !important; 
            opacity: 1 !important; 
            z-index: 1;
        }
        .footer-skyline-bg svg {
            width: 100%;
            height: 100%;
        }
        .footer-inner-content {
            position: relative;
            z-index: 2;
        }
    </style>
</head>

        <a href="tel:+8801775202920" id="float-tel" class="float-btn f-phone" title="Call Us"><i class="fas fa-phone"></i></a>
        <button class="back-to-top-btn" id="back-to-top" title="Back to Top"><i class="fas fa-arrow-up"></i></button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let activeProjectsList = []; 
            
            /* 1. System Synchronization */
            async function pullDynamicContent() {
                try {
                    const projectsRes = await fetch('/api/projects').then(r => r.json()).catch(() => []);

                    // Helper to safely extract arrays from various API formats
                    function getSafeArray(payload) {
                        if (Array.isArray(payload)) return payload;
                        if (payload && typeof payload === 'object') {
                            return payload.projects || payload.services || payload.messages || payload.media || payload.data || [];
                        }
                        return [];
                    }

                    const safeProjects = getSafeArray(projectsRes);

                    if (safeProjects && safeProjects.length > 0) {
                        activeProjectsList = safeProjects;
                        renderFilteredPortfolio('All'); 
                    } else {
                        document.getElementById('dyn-gallery-container').innerHTML = `<div style="grid-column:span 12; text-align:center; color:var(--color-text-muted); padding:40px;">No registered signature projects found in the system database.</div>`;
                    }

                    bindScrollObservers();

                } catch (err) {
                    console.error("System Hydration Failure:", err);
                }
            }

            // Portfolio status-based filter renderer
            function renderFilteredPortfolio(statusFilter) {
                const galleryContainer = document.getElementById('dyn-gallery-container');
                galleryContainer.innerHTML = '';
                
                const filtered = statusFilter === 'All' 
                    ? activeProjectsList 
                    : activeProjectsList.filter(p => (p.status || 'Ongoing').toLowerCase() === statusFilter.toLowerCase());

                if (filtered.length === 0) {
                    galleryContainer.innerHTML = `<div style="grid-column:span 12; text-align:center; color:var(--color-text-muted); padding:40px;">No projects currently matching "${statusFilter}" designation status.</div>`;
                    return;
                }

                const layouts = ['gi-1', 'gi-2', 'gi-3', 'gi-4', 'gi-5', 'gi-6', 'gi-7'];
                filtered.forEach((proj, idx) => {
                    const layoutClass = layouts[idx % layouts.length];
                    const imgSource = proj.image_path ? proj.image_path : 'images/unnamed1.jpg';
                    
                    galleryContainer.innerHTML += `
                        <div class="gallery-item ${layoutClass} reveal active">
                            <a href="project-details.html?project=${proj.id}" style="display: block; width: 100%; height: 100%; color: inherit; text-decoration: none;">
                                <img src="${imgSource}" alt="${proj.title}" loading="lazy">
                                <div class="item-overlay"><span>${proj.title} (${proj.category})</span></div>
                            </a>
                        </div>
                    `;
                });
                bindScrollObservers();
            }

            // Filter button bindings
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    renderFilteredPortfolio(e.target.getAttribute('data-status'));
                });
            });

            /* Loader Logic & Initialization */
            const loader = document.getElementById('premium-loader');
            const loaderBar = document.getElementById('loader-bar');
            let width = 0;
            
            const interval = setInterval(() => {
                width += Math.random() * 30;
                if(width > 100) width = 100;
                loaderBar.style.width = width + '%';
                
                if(width === 100) {
                    clearInterval(interval);
                    setTimeout(async () => {
                        await pullDynamicContent(); 
                        loader.style.opacity = '0';
                        setTimeout(() => loader.style.display = 'none', 500);
                    }, 500);
                }
            }, 100);

            /* Header Scroll Effect */
            const header = document.getElementById('main-header');
            window.addEventListener('scroll', () => {
                if(window.scrollY > 50) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
            });

            /* Mobile Hamburger Menu Drawer Trigger */
            const hamburger = document.getElementById('hamburger-trigger');
            const mobilePanel = document.getElementById('mobile-panel');
            const mobileMenuClose = document.getElementById('mobile-menu-close');

            if (hamburger && mobilePanel) {
                hamburger.addEventListener('click', () => {
                    hamburger.classList.add('active');
                    mobilePanel.classList.add('active');
                });
            }

            if (mobileMenuClose) {
                mobileMenuClose.addEventListener('click', () => {
                    hamburger.classList.remove('active');
                    mobilePanel.classList.remove('active');
                });
            }

            mobilePanel.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    hamburger.classList.remove('active');
                    mobilePanel.classList.remove('active');
                });
            });

            /* Premium Theme Select-Selectors logic */
            const desktopThemeSelector = document.getElementById('desktop-theme-selector');
            const mobileThemeSelector = document.getElementById('mobile-theme-selector');
            
            function applyTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('sw_theme', theme);
                if (desktopThemeSelector) desktopThemeSelector.value = theme;
                if (mobileThemeSelector) mobileThemeSelector.value = theme;
            }

            [desktopThemeSelector, mobileThemeSelector].forEach(selector => {
                if (selector) {
                    selector.addEventListener('change', (e) => {
                        applyTheme(e.target.value);
                    });
                }
            });

            // Initialize active theme
            const savedTheme = localStorage.getItem('sw_theme') || 'light';
            applyTheme(savedTheme);

            /* Back to Top button logic */
            const btt = document.getElementById('back-to-top');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 400) {
                    btt.classList.add('visible');
                } else {
                    btt.classList.remove('visible');
                }
            });
            btt.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            /* Reveal on Scroll */
            function bindScrollObservers() {
                const observerOptions = { threshold: 0.1 };
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if(entry.isIntersecting) {
                            entry.target.classList.add('reveal');
                            entry.target.classList.add('active');
                        }
                    });
                }, observerOptions);

                document.querySelectorAll('.gallery-item, .reveal').forEach(el => {
                    observer.observe(el);
                });
            }
            bindScrollObservers();
        });
    </script>
