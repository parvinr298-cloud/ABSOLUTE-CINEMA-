<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOUTH WIND | Project Specifications</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --color-bg: #ffffff;
            --color-text: #1a1a1a;
            --color-text-muted: #666666;
            --color-accent: #000000;
            --color-primary: #1a1a1a;
            --color-surface: #fcfcfc;
            --color-surface-dark: #f2f2f2;
            --color-border: #eeeeee;
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Playfair Display', serif;
            --container-width: 1440px;
            --slider-linear: 0,0,0;
        }

        [data-theme="dark"] {
            --color-bg: #0a0a0a;
            --color-text: #ffffff;
            --color-text-muted: #a0a0a0;
            --color-accent: #ffffff;
            --color-surface: #141414;
            --color-surface-dark: #1f1f1f;
            --color-border: #2a2a2a;
            --slider-linear: 0,0,0;
        }

        [data-theme="blueprint"] {
            --color-bg: #00162e;
            --color-text: #dcf1ff;
            --color-text-muted: #74aade;
            --color-accent: #00f0ff;
            --color-surface: #002347;
            --color-surface-dark: #002d59;
            --color-border: #003c73;
            --slider-linear: 0,22,46;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background-color: var(--color-bg); color: var(--color-text); line-height: 1.7; padding-bottom: 0px; transition: background-color 0.3s, color 0.3s;}

        /* Return Navigation */
        .back-nav {
            position: relative;
            padding: 30px 5%;
            max-width: var(--container-width);
            margin: 0 auto;
            z-index: 10;
        }
        .back-nav a {
            text-decoration: none;
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        /* Hero Specifications & Automated Image Swapping Slider */
        .project-hero {
            position: relative;
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
            padding: 100px 20px 80px 20px;
            z-index: 5;
            color: #ffffff;
        }
        .project-hero-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 480px;
            z-index: 1;
            overflow: hidden;
        }
        .slider-slide {
            position: absolute;
            inset: 0;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .slider-slide.active {
            opacity: 1;
        }
        .project-category {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.7);
            display: block;
            margin-bottom: 15px;
        }
        .project-title {
            font-family: var(--font-serif);
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            margin-bottom: 30px;
            line-height: 1.1;
        }
        .project-desc {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.85);
            max-width: 700px;
            margin: 0 auto;
        }

        /* Technical Specs Card Grid */
        .specs-section-box {
            max-width: 850px;
            margin: -30px auto 60px auto;
            background: var(--color-surface);
            padding: 45px;
            border-radius: 4px;
            border: 1px solid var(--color-border);
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            position: relative;
            z-index: 10;
        }
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            text-align: left;
        }
        .spec-item {
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 10px;
        }
        .spec-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--color-text-muted);
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .spec-value {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--color-text);
        }

        /* Media Container */
        .page-container {
            width: 90%;
            max-width: var(--container-width);
            margin: 0 auto;
            opacity: 0;
            transition: opacity 0.5s ease;
            display: none;
        }
        .page-container.active { display: block; opacity: 1; }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }
        @media (max-width: 768px) { .media-grid { grid-template-columns: 1fr; } }
        
        .media-asset { width: 100%; height: auto; border-radius: 4px; border: 1px solid var(--color-border); }

        /* Pagination Controls */
        .pagination-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin: 60px auto 0 auto;
            width: 90%;
            max-width: var(--container-width);
            padding: 30px 0;
            border-top: 1px solid var(--color-border);
        }
        .page-btn {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-text);
            padding: 10px 20px;
            cursor: pointer;
            font-family: var(--font-sans);
            font-weight: 600;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            border-radius: 4px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .page-btn.active, .page-btn:hover { background: var(--color-accent); color: var(--color-bg); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .page-title {
            text-align: center; font-size: 1.5rem; margin-bottom: 40px; font-family: var(--font-serif);
        }

        .inner-pages-indicator {
            display: flex;
            gap: 8px;
        }

        @media (max-width: 768px) {
            .pagination-controls {
                flex-direction: column;
                gap: 20px;
            }
            .page-btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* 3D Blueprint Skyline Sketch Wrapper */
        .bottom-blueprint-sketch {
            width: 100%;
            overflow: hidden;
            background: transparent;
            pointer-events: none;
            user-select: none;
            color: var(--color-text-muted);
            opacity: 0.4;
            margin-top: 50px;
            line-height: 0;
        }
        .bottom-blueprint-sketch svg {
            width: 100%;
            height: auto;
            max-height: 180px;
        }

        footer {
            background: var(--color-surface-dark);
            padding: 40px 0;
            text-align: center;
            border-top: 1px solid var(--color-border);
        }
        .footer-copyright {
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Back to Top floating button */
        .back-to-top-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--color-text);
            font-size: 1.2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 999;
        }
        [data-theme="dark"] .back-to-top-btn {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .back-to-top-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .back-to-top-btn:hover {
            transform: scale(1.1) translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="project-hero-slider" id="hero-slider-bg"></div>

    <div class="back-nav">
        <a href="index.html#projects"><i class="fas fa-arrow-left"></i> Return to Studio</a>

    <div class="pagination-controls" id="pagination-wrapper"></div>

            <rect x="80" y="30" width="60" height="80" fill="currentColor" opacity="0.05" />
            <rect x="220" y="10" width="80" height="100" fill="currentColor" opacity="0.07" />
            <polygon points="400,110 400,40 450,20 500,40 500,110" fill="currentColor" opacity="0.05" />

    <footer>
        <p class="footer-copyright">© 2024 SOUTH WIND ENGINEERING. ALL RIGHTS RESERVED.</p>
    </footer>

    <button class="back-to-top-btn" id="back-to-top" title="Back to Top"><i class="fas fa-arrow-up"></i></button>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const activeTheme = localStorage.getItem('sw_theme') || 'light';
            document.documentElement.setAttribute('data-theme', activeTheme);

            const urlParams = new URLSearchParams(window.location.search);
            let projectId = urlParams.get('project');
            const categoryParam = urlParams.get('category');
            
            const isLocalPreview = window.location.protocol === 'file:';

            // Helper to safely extract arrays from various API formats
            function getSafeArray(payload) {
                if (Array.isArray(payload)) return payload;
                if (payload && typeof payload === 'object') {
                    return payload.projects || payload.services || payload.messages || payload.media || payload.data || [];
                }
                return [];
            }

            // Helper to cleanly render images, local videos, or YouTube links
            function renderMediaAsset(m) {
                if (m.media_type === 'video') {
                    const path = m.media_path || '';
                    if (path.includes('youtube.com') || path.includes('youtu.be')) {
                        let videoId = '';
                        try {
                            if (path.includes('youtu.be/')) {
                                videoId = path.split('youtu.be/')[1].split(/[?#]/)[0];
                            } else {
                                const urlObj = new URL(path);
                                videoId = urlObj.searchParams.get('v');
                            }
                        } catch (e) {
                            console.error("Invalid YouTube URL path", e);
                        }
                        return `<iframe class="media-asset" style="aspect-ratio:16/9; width:100%; border:none; min-height:280px;" src="https://www.youtube.com/embed/${videoId}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                    } else {
                        return `<video class="media-asset" src="${m.media_path}" controls autoplay muted loop></video>`;
                    }
                } else {
                    return `<img class="media-asset" src="${m.media_path || 'images/unnamed1.jpg'}" alt="Asset">`;
                }
            }

            try {
                let proj = null;
                let prevProjNode = null;
                let nextProjNode = null;
                let pages = [];

                // --- ONLINE CATEGORY BACKEND LOOKUP AUTO-RESOLVER ---
                if (!isLocalPreview && !projectId && categoryParam) {
                    try {
                        const resAll = await fetch('/api/projects');
                        const payload = await resAll.json();
                        const allProjs = getSafeArray(payload);
                        const matchedProj = allProjs.find(p => p.category === categoryParam);
                        if (matchedProj) {
                            projectId = matchedProj.id; 
                        }
                    } catch (e) {
                        console.error("Online category lookup resolution failed", e);
                    }
                }

                if (isLocalPreview || !projectId) {
                    // --- OFFLINE/LOCAL STATIC PREVIEW FALLBACK ---
                    const targetCategory = categoryParam || "Residential Elite";
                    proj = {
                        category: targetCategory,
                        title: targetCategory,
                        description: "Local File Preview. Run Node Server on Termux/PC to connect database API.",
                        status: "Ongoing",
                        brochure_url: "",
                        pages: [
                            {
                                title: "Primary Structural Design",
                                media: [
                                    { media_type: "image", media_path: "images/unnamed1.jpg" },
                                    { media_type: "image", media_path: "images/unnamed2.jpg" }
                                ]
                            },
                            {
                                title: "Interior Layout Concept",
                                media: [
                                    { media_type: "image", media_path: "images/unnamed3.jpg" },
                                    { media_type: "image", media_path: "images/unnamed4.jpg" }
                                ]
                            }
                        ]
                    };
                    pages = proj.pages;
                } else {
                    // --- ONLINE RUNTIME API INTEGRATION ---
                    const resAllProjects = await fetch('/api/projects');
                    const allProjectsPayload = await resAllProjects.json();
                    const allProjects = getSafeArray(allProjectsPayload);
                    allProjects.sort((a, b) => a.category.localeCompare(b.category) || a.display_order - b.display_order);

                    const currentProjIndex = allProjects.findIndex(p => p.id == projectId);
                    prevProjNode = currentProjIndex > 0 ? allProjects[currentProjIndex - 1] : null;
                    nextProjNode = currentProjIndex < allProjects.length - 1 ? allProjects[currentProjIndex + 1] : null;

                    const res = await fetch(`/api/projects/${projectId}/details`);
                    proj = await res.json();
                    pages = proj.pages || [];
                }

                document.getElementById('render-category').innerText = proj.category;
                document.getElementById('render-title').innerText = proj.title;

                // --- PREMIUM MULTI-SLIDER DYNAMIC SWAP ANIMATOR ---
                const sliderBg = document.getElementById('hero-slider-bg');
                if (sliderBg) {
                    sliderBg.innerHTML = '';
                    const slideImages = [];
                    
                    // Add primary thumbnail first
                    if (proj.image_path) slideImages.push(proj.image_path);
                    
                    // Collect sub-page media images
                    pages.forEach(page => {
                        (page.media || []).forEach(m => {
                            if (m.media_type === 'image' && m.media_path) {
                                slideImages.push(m.media_path);
                            }
                        });
                    });

                    // Deduplicate images
                    const uniqueImages = [...new Set(slideImages)];
                    
                    if (uniqueImages.length > 0) {
                        uniqueImages.forEach((img, idx) => {
                            sliderBg.innerHTML += `
                                <div class="slider-slide ${idx === 0 ? 'active' : ''}" style="background-image: linear-gradient(to bottom, rgba(var(--slider-linear, 0,0,0), 0.5), rgba(var(--slider-linear, 0,0,0), 0.85)), url('${img}');"></div>
                            `;
                        });

                        // Autoplay fading if more than 1 image exists
                        if (uniqueImages.length > 1) {
                            let activeSlideIdx = 0;
                            setInterval(() => {
                                const slides = sliderBg.querySelectorAll('.slider-slide');
                                if (slides[activeSlideIdx]) {
                                    slides[activeSlideIdx].classList.remove('active');
                                }
                                activeSlideIdx = (activeSlideIdx + 1) % slides.length;
                                if (slides[activeSlideIdx]) {
                                    slides[activeSlideIdx].classList.add('active');
                                }
                            }, 5000); 
                        }
                    } else {
                        // Default Fallback
                        sliderBg.innerHTML = `<div class="slider-slide active" style="background-image: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.85)), url('images/unnamed6.jpg');"></div>`;
                    }
                }

                // --- ARONNOK-INSPIRED DYNAMIC SPECIFICATIONS CARD PARSER ---
                const specsGrid = document.getElementById('dyn-specs-grid');
                if (specsGrid) {
                    specsGrid.innerHTML = '';
                    
                    // Core properties
                    specsGrid.innerHTML += `
                        <div class="spec-item">
                            <span class="spec-label">Architectural Sector</span>
                            <span class="spec-value">${proj.category}</span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">Project Status</span>
                            <span class="spec-value">${proj.status || 'Ongoing'}</span>
                        </div>
                    `;

                    // Dynamic description bullet parsing logic
                    if (proj.description) {
                        const lines = proj.description.split('\n');
                        let parsedAny = false;
                        lines.forEach(line => {
                            if (line.includes(':')) {
                                const parts = line.split(':');
                                const key = parts[0].trim();
                                const val = parts.slice(1).join(':').trim();
                                if (key && val) {
                                    specsGrid.innerHTML += `
                                        <div class="spec-item">
                                            <span class="spec-label">${key}</span>
                                            <span class="spec-value">${val}</span>
                                        </div>
                                    `;
                                    parsedAny = true;
                                }
                            }
                        });
                        
                        if (!parsedAny) {
                            document.getElementById('render-desc').innerText = proj.description;
                        } else {
                            // Extract lines without colons to display as raw description text block
                            const rawDesc = lines.filter(line => !line.includes(':')).join('\n').trim();
                            document.getElementById('render-desc').innerText = rawDesc || '';
                        }
                    }
                }

                // --- CMS-EDITABLE BROCHURE TRIGGER ---
                if (proj.brochure_url) {
                    const brochureLink = document.getElementById('dyn-brochure-link');
                    brochureLink.href = proj.brochure_url;
                    document.getElementById('brochure-container').style.display = 'block';
                }

                const wrapper = document.getElementById('pages-wrapper');
                wrapper.innerHTML = '';

                if (pages.length === 0) {
                    wrapper.innerHTML = `
                        <div class="page-container active" style="opacity: 1; display: block;">
                            <div class="media-grid">
                                <img class="media-asset" src="${proj.image_path || 'images/unnamed1.jpg'}">
                            </div>
                        </div>`;
                } else {
                    pages.forEach((page, idx) => {
                        let mediaHTML = '';
                        (page.media || []).forEach(m => {
                            mediaHTML += renderMediaAsset(m);
                        });

                        wrapper.innerHTML += `
                            <div class="page-container" id="page-node-${idx}">
                                <h2 class="page-title">${page.title || ''}</h2>
                                <div class="media-grid">${mediaHTML}</div>
                            </div>
                        `;
                    });
                }

                // Render Controls Interface
                const paginator = document.getElementById('pagination-wrapper');
                
                function drawPagination(currentIdx) {
                    paginator.innerHTML = '';
                    
                    if (isLocalPreview) {
                        paginator.innerHTML += `<div style="color:var(--color-text-muted); font-size:0.8rem; text-align:center; width:100%; margin-bottom: 10px;">PREVIEW MODE ENABLED (Offline Local Files)</div>`;
                    }

                    // Left Side: Previous Project Anchor
                    if (prevProjNode) {
                        const prevProjBtn = document.createElement('a');
                        prevProjBtn.className = 'page-btn';
                        prevProjBtn.href = `?project=${prevProjNode.id}`;
                        prevProjBtn.innerHTML = `<i class="fas fa-arrow-left"></i> Prev Project`;
                        paginator.appendChild(prevProjBtn);
                    } else {
                        const spacer = document.createElement('div');
                        spacer.style.width = "100px";
                        paginator.appendChild(spacer);
                    }

                    // Middle Section: Inner Photo Pages indicators
                    if (pages.length > 1) {
                        const innerPagesWrapper = document.createElement('div');
                        innerPagesWrapper.className = 'inner-pages-indicator';

                        pages.forEach((_, idx) => {
                            const btn = document.createElement('button');
                            btn.className = `page-btn ${idx === currentIdx ? 'active' : ''}`;
                            btn.innerText = idx + 1;
                            btn.onclick = () => {
                                document.querySelectorAll('.page-container').forEach(el => el.classList.remove('active'));
                                document.getElementById(`page-node-${idx}`).classList.add('active');
                                drawPagination(idx);
                            };
                            innerPagesWrapper.appendChild(btn);
                        });
                        paginator.appendChild(innerPagesWrapper);
                    } else {
                        const textNode = document.createElement('span');
                        textNode.style.color = "var(--color-text-muted)";
                        textNode.style.fontSize = "0.8rem";
                        textNode.innerText = "SINGLE SECTION VIEW";
                        paginator.appendChild(textNode);
                    }

                    // Right Side: Next Project Anchor
                    if (nextProjNode) {
                        const nextProjBtn = document.createElement('a');
                        nextProjBtn.className = 'page-btn';
                        nextProjBtn.href = `?project=${nextProjNode.id}`;
                        nextProjBtn.innerHTML = `Next Project <i class="fas fa-arrow-right"></i>`;
                        paginator.appendChild(nextProjBtn);
                    } else {
                        const spacer = document.createElement('div');
                        spacer.style.width = "100px";
                        paginator.appendChild(spacer);
                    }
                }

                if (pages.length > 0) {
                    document.querySelectorAll('.page-container').forEach(el => el.classList.remove('active'));
                    document.getElementById(`page-node-0`).classList.add('active');
                    drawPagination(0);
                } else {
                    drawPagination(0);
                }

            } catch (err) {
                document.getElementById('render-title').innerText = 'Data Sync Timeout';
            }

            /* Back to Top button logic */
            const btt = document.getElementById('back-to-top');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 300) {
                    btt.classList.add('visible');
                } else {
                    btt.classList.remove('visible');
                }
            });
            btt.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
